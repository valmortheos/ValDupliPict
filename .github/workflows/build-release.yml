name: Build & Sign Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Verify Keystore is Valid
        run: |
          keytool -list \
            -keystore app/keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -storetype JKS

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          VERSION=$(./gradlew -q printVersionName)
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/ValDupliPict-v${VERSION}-release.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ValDupliPict-Release-APK
          path: app/build/outputs/apk/release/ValDupliPict-*-release.apk
          retention-days: 30
